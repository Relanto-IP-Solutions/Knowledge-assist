version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge_assist_backend
    restart: unless-stopped
    env_file:
      - ./configs/.env
      - ./configs/secrets/.env
    environment:
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      sh -c "uv sync --no-dev &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src --reload-dir configs --reload-dir functions"
